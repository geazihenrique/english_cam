name: Deploy English Cam

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Restore source
        run: |
          mkdir -p restored
          cat source/source.part.* > /tmp/english_cam_source.tgz.b64
          perl -0pi -e 's/p28lm1F/p28dm1F/; s/KbCb9UW3gQVy/KbCb9UWzgQVy/' /tmp/english_cam_source.tgz.b64
          base64 -d /tmp/english_cam_source.tgz.b64 > /tmp/english_cam_source.tgz
          tar -xzf /tmp/english_cam_source.tgz -C restored
      - name: Apply app updates
        run: |
          cat source/update.patch.part.* > /tmp/english_cam_update.patch.gz.b64
          base64 -d /tmp/english_cam_update.patch.gz.b64 > /tmp/english_cam_update.patch.gz
          gzip -dc /tmp/english_cam_update.patch.gz > /tmp/english_cam_update.patch
          patch -p2 -d restored < /tmp/english_cam_update.patch
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: restored
        run: npm install
      - name: Build
        working-directory: restored
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: restored/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
